# Foundry configuration for Robinhood Chain
# Chain reference: https://docs.robinhood.com/chain/connecting/
#   Mainnet: chain id 4663,  https://rpc.mainnet.chain.robinhood.com
#   Testnet: chain id 46630, https://rpc.testnet.chain.robinhood.com

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
# Robinhood Chain runs Arbitrum Nitro which supports Cancun opcodes
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]

# Fork tests hit the live mainnet RPC and are excluded from the default run
[profile.default.fuzz]
runs = 256

[rpc_endpoints]
robinhood = "${ROBINHOOD_RPC_URL}"
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
