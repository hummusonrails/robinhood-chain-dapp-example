<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#110E08"/>
      <stop offset="50%" stop-color="#1D1A14"/>
      <stop offset="100%" stop-color="#110E08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="50%" stop-color="#E7FF38"/>
      <stop offset="100%" stop-color="#CCFF00"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCFF00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#CCFF00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#CCFF00" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Top glow -->
  <ellipse cx="640" cy="0" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="318" width="1280" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- Title -->
  <text x="640" y="120" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1.5" fill="#FFFFFF">
    Robinhood Chain Index Baskets
  </text>

  <!-- Subtitle -->
  <text x="640" y="170" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#E7FF38">
    Onchain index baskets of tokenized stocks, priced live by Chainlink
  </text>

  <!-- Tech pills -->
  <g transform="translate(640, 220)" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
     font-size="13" font-weight="500">
    <rect x="-258" y="-16" width="76" height="30" rx="15" fill="#CCFF00" opacity="0.12" stroke="#CCFF00" stroke-opacity="0.25"/>
    <text x="-220" y="4" fill="#CCFF00">Solidity</text>
    <rect x="-170" y="-16" width="76" height="30" rx="15" fill="#CCFF00" opacity="0.12" stroke="#CCFF00" stroke-opacity="0.25"/>
    <text x="-132" y="4" fill="#CCFF00">Foundry</text>
    <rect x="-82" y="-16" width="86" height="30" rx="15" fill="#CCFF00" opacity="0.12" stroke="#CCFF00" stroke-opacity="0.25"/>
    <text x="-39" y="4" fill="#CCFF00">Chainlink</text>
    <rect x="16" y="-16" width="86" height="30" rx="15" fill="#CCFF00" opacity="0.12" stroke="#CCFF00" stroke-opacity="0.25"/>
    <text x="59" y="4" fill="#CCFF00">ERC-8056</text>
    <rect x="114" y="-16" width="72" height="30" rx="15" fill="#CCFF00" opacity="0.12" stroke="#CCFF00" stroke-opacity="0.25"/>
    <text x="150" y="4" fill="#CCFF00">Next.js</text>
    <rect x="198" y="-16" width="64" height="30" rx="15" fill="#CCFF00" opacity="0.12" stroke="#CCFF00" stroke-opacity="0.25"/>
    <text x="230" y="4" fill="#CCFF00">wagmi</text>
  </g>
</svg>
